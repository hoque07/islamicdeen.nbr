<header class="nav-shell">
  <a class="brand" routerLink="/">
    <span class="brand-mark">د</span>
    <span>
      <strong>DEEN & DIN</strong>
      <small>ইসলামিক লাইফস্টাইল</small>
    </span>
  </a>

  <nav class="desktop-links" aria-label="Primary navigation">
    @for (link of links; track link.path) {
      <a [routerLink]="link.path" routerLinkActive="active" [routerLinkActiveOptions]="{ exact: link.path === '/' }">{{ link.label }}</a>
    }
  </nav>

  <div class="nav-actions">
    <input type="search" placeholder="Search / খুঁজুন" (input)="updateSearch($event)" [value]="search.query$ | async" />
    <button type="button" class="theme-toggle" (click)="storage.toggleDarkMode()" [attr.aria-pressed]="storage.darkMode()">
      {{ storage.darkMode() ? 'Light' : 'Dark' }}
    </button>
  </div>
</header>

<nav class="bottom-nav" aria-label="Mobile navigation">
  @for (link of links.slice(0, 5); track link.path) {
    <a [routerLink]="link.path" routerLinkActive="active" [routerLinkActiveOptions]="{ exact: link.path === '/' }">{{ link.label }}</a>
  }
</nav>
